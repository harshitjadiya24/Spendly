{% extends "base.html" %}

{% block title %}Add expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Add transaction</h1>
      <p class="auth-subtitle">Log an expense or income entry</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('add_expense') }}">
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" name="type" class="form-input" required>
            <option value="expense" selected>Expense</option>
            <option value="income">Income</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="text" id="amount" name="amount" class="form-input"
                 placeholder="450.00" required autofocus>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            <option value="">Select category</option>
            {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 value="{{ today }}" required>
        </div>

        <div class="form-group">
          <label for="description">Description (optional)</label>
          <input type="text" id="description" name="description" class="form-input"
                 placeholder="Weekly groceries">
        </div>

        <button type="submit" class="btn-submit">Save transaction</button>
      </form>
    </div>
  </div>
</section>

{% endblock %}
