{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">Edit transaction</h1>
      <p class="auth-subtitle">Update this entry</p>
    </div>

    <div class="auth-card">
      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
          <label for="type">Type</label>
          <select id="type" name="type" class="form-input" required>
            <option value="expense" {% if expense.type == 'expense' %}selected{% endif %}>Expense</option>
            <option value="income" {% if expense.type == 'income' %}selected{% endif %}>Income</option>
          </select>
        </div>

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input type="text" id="amount" name="amount" class="form-input"
                 value="{{ "%.2f"|format(expense.amount) }}" required autofocus>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input" required>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if expense.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" class="form-input"
                 value="{{ expense.date }}" required>
        </div>

        <div class="form-group">
          <label for="description">Description (optional)</label>
          <input type="text" id="description" name="description" class="form-input"
                 value="{{ expense.description or "" }}">
        </div>

        <button type="submit" class="btn-submit">Update transaction</button>
      </form>

      <form method="POST" action="{{ url_for('delete_expense', id=expense.id) }}"
            style="margin-top:1rem" onsubmit="var f=this;showConfirm('Delete this transaction?',function(){f.submit();});return false;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="btn-delete">Delete</button>
      </form>
    </div>
  </div>
</section>

{% endblock %}
